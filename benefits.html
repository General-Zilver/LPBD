<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LPBD Benefits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ea;
  --paper: #fbf9f4;
  --ink: #1a1814;
  --ink-soft: #4a463e;
  --muted: #8a8478;
  --rule: #d8d2c4;
  --accent: #b54a2c;
  --accent-soft: #e8d5cc;
  --green: #4a6b3a;
  --green-soft: #d4dcc8;
  --amber: #a87a1f;
  --amber-soft: #f0e3c4;
  --gray-soft: #e2ddd0;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.55;
  background-image:
    repeating-linear-gradient(0deg, transparent 0, transparent 31px, rgba(26,24,20,0.025) 31px, rgba(26,24,20,0.025) 32px);
}
.wrap { max-width: 1180px; margin: 0 auto; padding: 48px 32px 80px; }
header {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 24px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 24px;
}
h1 {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: clamp(40px, 6vw, 68px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin: 0;
  font-variation-settings: 'opsz' 144;
}
.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-top: 12px;
}
.meta-block {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-align: right;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.meta-block .count {
  font-family: 'Fraunces', serif;
  font-size: 56px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  display: block;
  letter-spacing: -0.02em;
  text-transform: none;
}
.controls {
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 20px 24px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
.search {
  width: 100%;
  font-family: 'Fraunces', serif;
  font-size: 22px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 8px 0 12px;
  color: var(--ink);
  outline: none;
}
.search::placeholder { color: var(--muted); font-style: italic; }
.search:focus { border-bottom-color: var(--accent); }
.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  align-items: flex-start;
}
.filter-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.filter-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  border: 1px solid var(--rule);
  background: var(--paper);
  cursor: pointer;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.summary-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 0 4px 16px;
  display: flex;
  justify-content: space-between;
}
.list { display: flex; flex-direction: column; }
.entry {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 24px;
  padding: 24px 4px;
  border-top: 1px solid var(--rule);
  align-items: start;
}
.entry:last-child { border-bottom: 1px solid var(--rule); }
.entry-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  padding-top: 8px;
}
.entry-body { min-width: 0; }
.entry-name {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 500;
  line-height: 1.2;
  margin: 0 0 4px;
  letter-spacing: -0.01em;
}
.entry-source {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 12px;
}
.entry-source a { color: var(--accent); text-decoration: none; }
.entry-source a:hover { text-decoration: underline; }
.entry-summary {
  color: var(--ink-soft);
  margin: 8px 0 12px;
  max-width: 70ch;
}
.entry-action {
  background: var(--paper);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  font-size: 14px;
  color: var(--ink-soft);
  margin: 12px 0;
  max-width: 80ch;
}
.entry-action strong {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  display: block;
  margin-bottom: 4px;
  font-weight: 700;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: 1px solid;
}
.badge-eligible { background: var(--green-soft); color: var(--green); border-color: var(--green); }
.badge-needsinfo { background: var(--amber-soft); color: var(--amber); border-color: var(--amber); }
.badge-tag { background: var(--paper); color: var(--ink-soft); border-color: var(--rule); }
.badge-action { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.empty {
  text-align: center;
  padding: 80px 20px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--muted);
  font-size: 22px;
}
footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  display: flex;
  justify-content: space-between;
}
@media (max-width: 720px) {
  .wrap { padding: 32px 20px 60px; }
  header { grid-template-columns: 1fr; }
  .meta-block { text-align: left; }
  .entry { grid-template-columns: 1fr; gap: 8px; }
  .entry-num { padding-top: 0; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Benefits<br>Ledger</h1>
      <div class="subtitle">LPBD Pipeline Output &middot; <span id="run-date"></span></div>
    </div>
    <div class="meta-block">
      <span class="count" id="visible-count">0</span>
      of <span id="total-count">0</span> matched
    </div>
  </header>

  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search by name, summary, or source...">
    <div class="filter-row">
      <div class="filter-group">
        <div class="filter-label">Eligibility</div>
        <div class="chips" id="eligibility-chips"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Match type</div>
        <div class="chips" id="matchtype-chips"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Tag</div>
        <div class="chips" id="tag-chips"></div>
      </div>
    </div>
  </div>

  <div class="summary-line">
    <span id="summary-text">All entries</span>
    <span><a href="#" id="reset-link" style="color: var(--accent); text-decoration: none;">Reset filters</a></span>
  </div>

  <div class="list" id="list"></div>

  <footer>
    <span>Local Privacy-Based Discovery</span>
    <span id="footer-meta"></span>
  </footer>
</div>

const ELIGIBILITY_LABELS = {
  likely_eligible: 'Likely eligible',
  needs_info: 'Needs info',
  not_eligible: 'Not eligible',
};
const MATCHTYPE_LABELS = {
  general_resource: 'General resource',
  aspirational: 'Aspirational',
  needs_info: 'Needs info',
  not_likely: 'Not likely',
};

const state = {
  search: '',
  eligibility: null,
  matchtype: null,
  tag: null,
};

function uniqueCounts(items, key) {
  const counts = {};
  items.forEach(it => {
    const v = it[key];
    if (Array.isArray(v)) {
      v.forEach(x => counts[x] = (counts[x] || 0) + 1);
    } else if (v) {
      counts[v] = (counts[v] || 0) + 1;
    }
  });
  return counts;
}

function buildChips(containerId, counts, labelMap, stateKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  entries.forEach(([key, count]) => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    const label = labelMap ? (labelMap[key] || key) : key;
    chip.textContent = label + ' (' + count + ')';
    chip.dataset.value = key;
    chip.addEventListener('click', () => {
      state[stateKey] = state[stateKey] === key ? null : key;
      render();
    });
    container.appendChild(chip);
  });
}

function passesFilters(item) {
  if (state.eligibility && item.eligibility !== state.eligibility) return false;
  if (state.matchtype && item.match_type !== state.matchtype) return false;
  if (state.tag && !(item.tags || []).includes(state.tag)) return false;
  if (state.search) {
    const q = state.search.toLowerCase();
    const hay = (item.name + ' ' + item.summary + ' ' + item.page_title + ' ' + (item.action_details || '')).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function escapeHTML(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderEntry(item, idx) {
  const eligClass = item.eligibility === 'likely_eligible' ? 'badge-eligible' : 'badge-needsinfo';
  const eligLabel = ELIGIBILITY_LABELS[item.eligibility] || item.eligibility;
  const tagBadges = (item.tags || []).map(t => `<span class="badge badge-tag">${escapeHTML(t)}</span>`).join('');
  const actionBlock = item.action_details ? `
    <div class="entry-action">
      <strong>How to apply / next step</strong>
      ${escapeHTML(item.action_details)}
    </div>` : '';
  return `
    <div class="entry">
      <div class="entry-num">№ ${String(idx).padStart(3, '0')}</div>
      <div class="entry-body">
        <h2 class="entry-name">${escapeHTML(item.name)}</h2>
        <div class="entry-source">
          <a href="${escapeHTML(item.page_url)}" target="_blank" rel="noopener">${escapeHTML(item.page_title)} ↗</a>
        </div>
        <div class="entry-summary">${escapeHTML(item.summary)}</div>
        ${actionBlock}
        <div class="badges">
          <span class="badge ${eligClass}">${escapeHTML(eligLabel)}</span>
          <span class="badge badge-action">${escapeHTML(MATCHTYPE_LABELS[item.match_type] || item.match_type)}</span>
          ${tagBadges}
        </div>
      </div>
    </div>`;
}

function render() {
  // Update active chip states
  document.querySelectorAll('#eligibility-chips .chip').forEach(c =>
    c.classList.toggle('active', c.dataset.value === state.eligibility));
  document.querySelectorAll('#matchtype-chips .chip').forEach(c =>
    c.classList.toggle('active', c.dataset.value === state.matchtype));
  document.querySelectorAll('#tag-chips .chip').forEach(c =>
    c.classList.toggle('active', c.dataset.value === state.tag));

  const filtered = DATA.filter(passesFilters);
  document.getElementById('visible-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = DATA.length;

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Nothing matches those filters.</div>';
  } else {
    list.innerHTML = filtered.map((item, i) => renderEntry(item, i + 1)).join('');
  }

  // Summary line
  const parts = [];
  if (state.eligibility) parts.push(ELIGIBILITY_LABELS[state.eligibility]);
  if (state.matchtype) parts.push(MATCHTYPE_LABELS[state.matchtype]);
  if (state.tag) parts.push('tagged: ' + state.tag);
  if (state.search) parts.push('"' + state.search + '"');
  document.getElementById('summary-text').textContent =
    parts.length === 0 ? 'Showing all entries' : 'Filtered by ' + parts.join(' / ');
}

function init() {
  document.getElementById('run-date').textContent =
    new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('footer-meta').textContent = DATA.length + ' Entries / Privacy-Preserving';

  buildChips('eligibility-chips', uniqueCounts(DATA, 'eligibility'), ELIGIBILITY_LABELS, 'eligibility');
  buildChips('matchtype-chips', uniqueCounts(DATA, 'match_type'), MATCHTYPE_LABELS, 'matchtype');
  buildChips('tag-chips', uniqueCounts(DATA, 'tags'), null, 'tag');

  document.getElementById('search').addEventListener('input', e => {
    state.search = e.target.value.trim();
    render();
  });
  document.getElementById('reset-link').addEventListener('click', e => {
    e.preventDefault();
    state.search = '';
    state.eligibility = null;
    state.matchtype = null;
    state.tag = null;
    document.getElementById('search').value = '';
    render();
  });

  render();
}

init();
</script>
</body>
</html>
