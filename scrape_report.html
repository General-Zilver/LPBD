<style>
:root {
  --bg: #f4f1ea;
  --paper: #fbf9f4;
  --ink: #1a1814;
  --ink-soft: #4a463e;
  --muted: #8a8478;
  --rule: #d8d2c4;
  --accent: #b54a2c;
  --accent-soft: #e8d5cc;
  --green: #4a6b3a;
  --green-soft: #d4dcc8;
  --amber: #a87a1f;
  --amber-soft: #f0e3c4;
  --red: #8a2c2c;
  --red-soft: #ecd0d0;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.55;
  background-image: repeating-linear-gradient(0deg, transparent 0, transparent 31px, rgba(26,24,20,0.025) 31px, rgba(26,24,20,0.025) 32px);
}
.wrap { max-width: 1180px; margin: 0 auto; padding: 48px 32px 80px; }
header {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 24px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 24px;
}
h1 {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: clamp(40px, 6vw, 68px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin: 0;
  font-variation-settings: 'opsz' 144;
}
.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-top: 12px;
}
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin-bottom: 32px;
}
.kpi {
  background: var(--paper);
  padding: 20px 24px;
}
.kpi-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 6px;
}
.kpi-value {
  font-family: 'Fraunces', serif;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
}
.kpi-value.warn { color: var(--amber); }
.kpi-value.bad { color: var(--red); }
.kpi-value.good { color: var(--green); }
.kpi-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
h2 {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 48px 0 16px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 8px;
}
h2 .small {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-left: 12px;
}
.bar-row {
  display: grid;
  grid-template-columns: 220px 1fr 80px;
  gap: 16px;
  align-items: center;
  padding: 8px 0;
  font-size: 13px;
}
.bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bar-track {
  background: var(--paper);
  border: 1px solid var(--rule);
  height: 22px;
  position: relative;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--ink);
}
.bar-fill.error { background: var(--red); }
.bar-fill.warn { background: var(--amber); }
.bar-fill.ok { background: var(--green); }
.bar-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  text-align: right;
}
.domain-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 20px 24px;
  margin-bottom: 16px;
}
.domain-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 12px;
}
.domain-name {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.domain-stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.domain-stats span { margin-right: 14px; }
.domain-stats .num { color: var(--ink); font-weight: 700; }
.domain-stats .num.bad { color: var(--red); }
.domain-stats .num.warn { color: var(--amber); }
.domain-stats .num.good { color: var(--green); }
.detail-toggle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: none;
  border: none;
  padding: 4px 0;
  margin-top: 8px;
}
.detail-body {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--rule);
  display: none;
}
.detail-body.open { display: block; }
.examples-list {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  list-style: none;
  padding: 0;
  margin: 8px 0;
}
.examples-list li {
  padding: 3px 0;
  border-bottom: 1px dotted var(--rule);
  word-break: break-all;
}
.examples-list a { color: var(--accent); text-decoration: none; }
.error-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  margin-top: 12px;
}
.error-table th {
  text-align: left;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  border-bottom: 1px solid var(--rule);
  padding: 6px 8px;
}
.error-table td {
  padding: 4px 8px;
  border-bottom: 1px dotted var(--rule);
  vertical-align: top;
  word-break: break-all;
}
.error-table .cat-cell {
  white-space: nowrap;
  width: 130px;
}
.cat-pill {
  display: inline-block;
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
}
.cat-junk_title { background: var(--amber-soft); color: var(--amber); border-color: var(--amber); }
.cat-duplicate { background: var(--gray-soft, #e2ddd0); color: var(--ink-soft); border-color: var(--rule); }
.cat-empty_text { background: var(--gray-soft, #e2ddd0); color: var(--ink-soft); border-color: var(--rule); }
.cat-auth_utility { background: var(--gray-soft, #e2ddd0); color: var(--ink-soft); border-color: var(--rule); }
.cat-network { background: var(--red-soft); color: var(--red); border-color: var(--red); }
.cat-other { background: var(--paper); color: var(--muted); border-color: var(--rule); }
.cat-http_404, .cat-http_403, .cat-http_401, .cat-http_500, .cat-http_503 {
  background: var(--red-soft); color: var(--red); border-color: var(--red);
}
.search-section {
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 20px 24px;
  margin-top: 24px;
}
.search {
  width: 100%;
  font-family: 'Fraunces', serif;
  font-size: 18px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 6px 0 10px;
  outline: none;
  color: var(--ink);
}
.search:focus { border-bottom-color: var(--accent); }
.search-results {
  margin-top: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  max-height: 400px;
  overflow-y: auto;
}
.search-results .hit {
  padding: 6px 0;
  border-bottom: 1px dotted var(--rule);
  word-break: break-all;
}
.search-results .hit-cat {
  display: inline-block;
  font-size: 9px;
  margin-right: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.search-results .hit a { color: var(--accent); text-decoration: none; }
.note {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--ink-soft);
  font-style: italic;
  margin: 12px 0;
  padding: 10px 14px;
  background: var(--amber-soft);
  border-left: 3px solid var(--amber);
}
footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
@media (max-width: 720px) {
  .wrap { padding: 32px 20px 60px; }
  header { grid-template-columns: 1fr; }
  .bar-row { grid-template-columns: 1fr; gap: 4px; }
  .domain-head { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

const VIEW_TYPE = "scrape";

function fmt(n) { return n == null ? "0" : n.toLocaleString(); }
function escapeHTML(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderKPIs(items) {
  return `<div class="kpi-grid">${items.map(i => `
    <div class="kpi">
      <div class="kpi-label">${escapeHTML(i.label)}</div>
      <div class="kpi-value ${i.tone || ''}">${escapeHTML(i.value)}</div>
      ${i.sub ? `<div class="kpi-sub">${escapeHTML(i.sub)}</div>` : ''}
    </div>`).join('')}</div>`;
}

function renderBars(rows, max, getClass) {
  return rows.map(r => {
    const pct = max > 0 ? (r.value / max * 100) : 0;
    const cls = getClass ? getClass(r) : '';
    return `<div class="bar-row">
      <div class="bar-label">${escapeHTML(r.label)}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="bar-count">${fmt(r.value)}</div>
    </div>`;
  }).join('');
}

// ---------- MAP VIEW ----------
function renderMap(data) {
  const t = data.totals;
  const completePct = t.domains > 0 ? Math.round(t.completed_domains / t.domains * 100) : 0;
  let html = renderKPIs([
    { label: "Domains", value: fmt(t.domains), sub: `${t.completed_domains} completed (${completePct}%)`, tone: completePct === 100 ? 'good' : 'warn' },
    { label: "Total URLs", value: fmt(t.urls), sub: "discovered across all domains" },
    { label: "Avg per domain", value: fmt(Math.round(t.urls / Math.max(t.domains, 1))), sub: "URLs per mapped site" },
  ]);

  // Per-domain bars
  html += `<h2>URLs per Domain <span class="small">${data.domains.length} domains</span></h2>`;
  const sorted = [...data.domains].sort((a, b) => b.total_urls - a.total_urls);
  const max = Math.max(...sorted.map(d => d.total_urls), 1);
  html += renderBars(
    sorted.map(d => ({ label: d.name, value: d.total_urls })),
    max,
    () => ''
  );

  // Per-domain detail cards
  html += `<h2>Domain Details</h2>`;
  data.domains.forEach((d, idx) => {
    const exclPct = d.progress.length > 0 ? Math.round(d.exclusion_ratio * 100) : 0;
    html += `<div class="domain-card">
      <div class="domain-head">
        <div class="domain-name">${escapeHTML(d.name)}</div>
        <div class="domain-stats">
          <span><span class="num ${d.completed ? 'good' : 'bad'}">${d.completed ? 'OK' : 'INCOMPLETE'}</span></span>
          <span>URLs: <span class="num">${fmt(d.total_urls)}</span></span>
          ${d.bfs_fetched != null ? `<span>BFS fetched: <span class="num">${fmt(d.bfs_fetched)}</span></span>` : ''}
          <span>Excluded: <span class="num ${exclPct > 60 ? 'warn' : ''}">${exclPct}%</span></span>
          ${d.no_sitemap ? `<span class="num warn">no sitemap</span>` : ''}
        </div>
      </div>
      <button class="detail-toggle" onclick="document.getElementById('det-${idx}').classList.toggle('open')">Toggle examples and crawl progress</button>
      <div id="det-${idx}" class="detail-body">
        ${d.examples.length > 0 ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">Top 5 example URLs</div>
          <ul class="examples-list">${d.examples.map(u => `<li><a href="${escapeHTML(u)}" target="_blank" rel="noopener">${escapeHTML(u)}</a></li>`).join('')}</ul>` : ''}
        ${d.progress.length > 0 ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 6px;">Crawl progression (every 25 fetches)</div>
          <table class="error-table"><thead><tr><th>Crawled</th><th>Queue</th><th>Kept</th><th>Excluded</th><th>Current</th></tr></thead>
          <tbody>${d.progress.slice(-15).map(p => `<tr><td>${p.crawled}</td><td>${p.queue}</td><td>${p.kept}</td><td>${p.excluded}</td><td>${escapeHTML(p.current)}</td></tr>`).join('')}</tbody></table>
          ${d.progress.length > 15 ? `<div style="font-size:10px;color:var(--muted);margin-top:4px;">Showing last 15 of ${d.progress.length} progress checkpoints.</div>` : ''}` : ''}
      </div>
    </div>`;
  });

  return html;
}

// ---------- SCRAPE VIEW ----------
const CAT_LABELS = {
  junk_title: "Junk title (silent 404s)",
  duplicate: "Duplicate content",
  empty_text: "Empty page text",
  auth_utility: "Auth or utility page",
  http_404: "HTTP 404",
  http_403: "HTTP 403",
  http_401: "HTTP 401",
  http_503: "HTTP 503",
  network: "Network error (DNS / timeout)",
  other: "Other",
};

// Categories that represent the filter doing its job vs real fetch failures
const FILTER_CATS = new Set(['junk_title', 'duplicate', 'empty_text', 'auth_utility']);
const FAILURE_CATS = new Set(['http_404', 'http_403', 'http_401', 'http_400', 'http_500', 'http_503', 'network']);

function classifyOutcome(category) {
  if (FILTER_CATS.has(category)) return 'filtered';
  if (FAILURE_CATS.has(category)) return 'failed';
  return 'other';
}

function bucketDomain(d) {
  let filtered = 0, failed = 0, other = 0;
  d.error_samples.forEach(s => {
    const o = classifyOutcome(s.category);
    if (o === 'filtered') filtered++;
    else if (o === 'failed') failed++;
    else other++;
  });
  return { filtered, failed, other };
}

function renderScrape(data) {
  const t = data.totals;

  // Recompute totals using the three-bucket model
  let totalFiltered = 0, totalFailed = 0, totalOther = 0;
  data.domains.forEach(d => {
    const b = bucketDomain(d);
    totalFiltered += b.filtered;
    totalFailed += b.failed;
    totalOther += b.other;
  });
  // Effective success rate: of pages we actually wanted to read, how many gave us text?
  const fetchable = t.pages_scraped + totalFailed;
  const effective = fetchable > 0 ? Math.round(t.pages_scraped / fetchable * 100) : 0;

  let html = renderKPIs([
    { label: "Pages scraped", value: fmt(t.pages_scraped), sub: "usable text extracted", tone: 'good' },
    { label: "Filtered out", value: fmt(totalFiltered), sub: "scraper correctly skipped", tone: '' },
    { label: "Fetch failures", value: fmt(totalFailed), sub: "HTTP errors and network", tone: totalFailed > 500 ? 'bad' : 'warn' },
    { label: "Effective rate", value: effective + "%", sub: "scraped / fetchable", tone: effective > 70 ? 'good' : effective > 40 ? 'warn' : 'bad' },
  ]);

  // Filter outcomes (good catches)
  const cats = data.error_categories || {};
  const filterEntries = Object.entries(cats).filter(([c]) => FILTER_CATS.has(c)).sort((a, b) => b[1] - a[1]);
  const failureEntries = Object.entries(cats).filter(([c]) => FAILURE_CATS.has(c)).sort((a, b) => b[1] - a[1]);
  const otherEntries = Object.entries(cats).filter(([c]) => !FILTER_CATS.has(c) && !FAILURE_CATS.has(c)).sort((a, b) => b[1] - a[1]);

  if (filterEntries.length > 0) {
    const max = Math.max(...filterEntries.map(e => e[1]), 1);
    html += `<h2>Filter activity <span class="small">${fmt(totalFiltered)} pages correctly skipped</span></h2>`;
    html += renderBars(
      filterEntries.map(([cat, n]) => ({ label: CAT_LABELS[cat] || cat, value: n, cat })),
      max,
      () => 'ok'
    );
  }

  if (failureEntries.length > 0) {
    const max = Math.max(...failureEntries.map(e => e[1]), 1);
    html += `<h2>Fetch failures <span class="small">${fmt(totalFailed)} pages the scraper could not read</span></h2>`;
    html += renderBars(
      failureEntries.map(([cat, n]) => ({ label: CAT_LABELS[cat] || cat, value: n, cat })),
      max,
      () => 'error'
    );
  }

  if (otherEntries.length > 0) {
    const max = Math.max(...otherEntries.map(e => e[1]), 1);
    html += `<h2>Other <span class="small">uncategorized</span></h2>`;
    html += renderBars(
      otherEntries.map(([cat, n]) => ({ label: CAT_LABELS[cat] || cat, value: n, cat })),
      max,
      () => ''
    );
  }

  // Per-domain
  html += `<h2>By Domain</h2>`;
  data.domains.forEach((d, idx) => {
    const b = bucketDomain(d);
    const fetchableD = d.scraped + b.failed;
    const effPct = fetchableD > 0 ? Math.round(d.scraped / fetchableD * 100) : 0;
    html += `<div class="domain-card">
      <div class="domain-head">
        <div class="domain-name">${escapeHTML(d.name)}</div>
        <div class="domain-stats">
          <span>Pages: <span class="num">${fmt(d.page_count)}</span></span>
          <span>Scraped: <span class="num good">${fmt(d.scraped)}</span></span>
          <span>Filtered: <span class="num">${fmt(b.filtered)}</span></span>
          <span>Failed: <span class="num ${b.failed > 0 ? 'bad' : ''}">${fmt(b.failed)}</span></span>
          ${fetchableD > 0 ? `<span>Effective: <span class="num ${effPct > 70 ? 'good' : effPct > 40 ? 'warn' : 'bad'}">${effPct}%</span></span>` : ''}
        </div>
      </div>
      ${d.error_samples.length > 0 ? `<button class="detail-toggle" onclick="document.getElementById('det-${idx}').classList.toggle('open')">Toggle ${d.error_samples.length} error sample${d.error_samples.length === 1 ? '' : 's'}</button>
      <div id="det-${idx}" class="detail-body">
        <table class="error-table">
          <thead><tr><th class="cat-cell">Category</th><th>URL</th><th>Reason</th></tr></thead>
          <tbody>${d.error_samples.map(s => `<tr>
            <td class="cat-cell"><span class="cat-pill cat-${escapeHTML(s.category)}">${escapeHTML(s.category)}</span></td>
            <td><a href="${escapeHTML(s.url)}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;">${escapeHTML(s.url)}</a></td>
            <td>${escapeHTML(s.reason.length > 100 ? s.reason.slice(0, 100) + '...' : s.reason)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}
    </div>`;
  });

  // Search panel
  html += `<h2>Search Errors <span class="small">across all domains</span></h2>
    <div class="search-section">
      <input type="text" class="search" id="search" placeholder="Search by URL or reason...">
      <div class="search-results" id="search-results"></div>
    </div>`;
  return html;
}

// ---------- INIT ----------
document.getElementById('content').innerHTML = VIEW_TYPE === 'map' ? renderMap(DATA) : renderScrape(DATA);
document.getElementById('run-date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
document.getElementById('gen-date').textContent = new Date().toLocaleString();

// Wire up search if present
const searchEl = document.getElementById('search');
if (searchEl && VIEW_TYPE === 'scrape') {
  const allErrors = [];
  DATA.domains.forEach(d => {
    d.error_samples.forEach(s => allErrors.push({ ...s, domain: d.name }));
  });
  const resultsEl = document.getElementById('search-results');
  function updateSearch() {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { resultsEl.innerHTML = `<div style="color:var(--muted);font-style:italic;">Type to search ${allErrors.length.toLocaleString()} error entries...</div>`; return; }
    const hits = allErrors.filter(e =>
      e.url.toLowerCase().includes(q) || e.reason.toLowerCase().includes(q) || e.category.includes(q) || e.domain.toLowerCase().includes(q)
    ).slice(0, 200);
    resultsEl.innerHTML = hits.length === 0
      ? `<div style="color:var(--muted);font-style:italic;">No matches.</div>`
      : `<div style="color:var(--muted);margin-bottom:8px;">${hits.length}${hits.length === 200 ? '+' : ''} matches</div>` +
        hits.map(h => `<div class="hit">
          <span class="hit-cat">[${escapeHTML(h.category)}]</span>
          <a href="${escapeHTML(h.url)}" target="_blank" rel="noopener">${escapeHTML(h.url)}</a>
          <div style="color:var(--ink-soft);margin-top:2px;font-size:10px;">${escapeHTML(h.reason.length > 150 ? h.reason.slice(0, 150) + '...' : h.reason)}</div>
        </div>`).join('');
  }
  searchEl.addEventListener('input', updateSearch);
  updateSearch();
}
